<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Kenya flag stripes -->
  <rect x="0" y="0" width="40" height="13" fill="#006600"/>
  <rect x="0" y="13" width="40" height="1.5" fill="#FFFFFF"/>
  <rect x="0" y="14.5" width="40" height="11" fill="#BB0000"/>
  <rect x="0" y="25.5" width="40" height="1.5" fill="#FFFFFF"/>
  <rect x="0" y="27" width="40" height="13" fill="#000000"/>
  <!-- Maasai shield (center) -->
  <ellipse cx="20" cy="20" rx="10" ry="14" fill="#BB0000" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="20" y1="6" x2="20" y2="34" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="10" y1="20" x2="30" y2="20" stroke="#FFFFFF" stroke-width="2"/>
  <!-- "K" letter overlay -->
  <text x="13" y="27" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="900" fill="#FFFFFF">K</text>
</svg>

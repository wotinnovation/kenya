  <rect x="0" y="13" width="7" height="1.5" fill="#FFFFFF"/>
  <rect x="0" y="14.5" width="7" height="12" fill="#BB0000"/>
  <rect x="0" y="26.5" width="7" height="1.5" fill="#FFFFFF"/>
